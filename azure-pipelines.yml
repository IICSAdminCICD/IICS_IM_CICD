trigger:
  branches:
    include:
      - DEV

pool:
  vmImage: ubuntu-latest

variables:
- group: IICS_SECRETS

stages:

# -----------------------
# STAGE DEV
# -----------------------
- stage: DEV
  displayName: "Build from DEV"

  jobs:
  - job: Build
    displayName: "Build using DEV commit"

    steps:
    - checkout: self
      persistCredentials: true
      clean: true

    - script: |
        echo "Pipeline disparado por commit:"
        echo $(Build.SourceVersion)

        echo "Autor:"
        git log -1 --pretty=format:'%an'

        echo "Guardando commit para promoción"
        echo $(Build.SourceVersion) > commit.txt
      displayName: "Capturar commit"

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: commit.txt
        artifact: commitinfo
        publishLocation: pipeline
      displayName: "Publicar commit a promover"


# -----------------------
# STAGE QA
# -----------------------
- stage: QA
  displayName: "Promote commit to QA"
  dependsOn: DEV
  condition: succeeded()

  jobs:
  - deployment: DeployQA
    displayName: "Promote DEV commit to QA"
    environment: QA

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            persistCredentials: true
            clean: true

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: commitinfo
              path: $(Pipeline.Workspace)
            displayName: "Descargar commit"

          - script: |

              COMMIT=$(cat $(Pipeline.Workspace)/commit.txt)

              echo "Commit que disparó el pipeline:"
              echo $COMMIT

              git config --global user.email "dl-GlobalMasterIICSAdmin@ppg.com"
              git config --global user.name "IICSAdminCICD"

              echo "Fetch repo"
              git fetch origin

              echo "Checkout QA"
              git checkout QA
              git pull origin QA

              echo "Detectando cambios del commit"

              git diff-tree --no-commit-id --name-status -r $COMMIT | while read status file
              do

                  echo "Cambio detectado: $status $file"

                  if [ "$status" = "D" ]; then
                      echo "El archivo fue eliminado en DEV → eliminando en QA"
                      git rm -f "$file" || true

                  else
                      echo "Actualizando archivo desde DEV"
                      git checkout $COMMIT -- "$file"
                      git add "$file"

                  fi

              done

              echo "Creando commit de promoción"

              git diff --cached --quiet || git commit -m "Promote changes from DEV commit $COMMIT to QA"

              echo "Push a QA"
              git push origin QA

            displayName: "Promote only files changed in commit"