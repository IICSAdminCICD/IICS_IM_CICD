trigger:
  branches:
    include:
      - DEV

pool:
  vmImage: ubuntu-latest

variables:
- group: IICS_SECRETS

stages:

# -----------------------
# STAGE DEV
# -----------------------
- stage: DEV
  displayName: "Build from DEV"

  jobs:
  - job: Build
    displayName: "Build using DEV commit"

    steps:
    - checkout: self
      persistCredentials: true
      clean: true

    - script: |
        echo "Pipeline disparado por commit:"
        echo $(Build.SourceVersion)

        echo "Autor:"
        git log -1 --pretty=format:'%an'

        echo "Guardando commit para promoción"
        echo $(Build.SourceVersion) > commit.txt
      displayName: "Capturar commit"

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: commit.txt
        artifact: commitinfo
        publishLocation: pipeline
      displayName: "Publicar commit a promover"


# -----------------------
# STAGE QA
# -----------------------
- stage: QA
  displayName: "Promote commit to QA"
  dependsOn: DEV
  condition: succeeded()

  jobs:
  - deployment: DeployQA
    displayName: "Promote DEV commit to QA"
    environment: QA

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            persistCredentials: true
            clean: true

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: commitinfo
              path: $(Pipeline.Workspace)
            displayName: "Descargar commit"

          - script: |

              COMMIT=$(cat $(Pipeline.Workspace)/commit.txt)

              echo "Commit que disparó el pipeline:"
              echo $COMMIT

              git config --global user.email "pipeline@devops"
              git config --global user.name "Azure DevOps Pipeline"

              echo "Fetch repo"
              git fetch origin

              echo "Archivos modificados en el commit:"
              git diff-tree --no-commit-id --name-only -r $COMMIT > files.txt
              cat files.txt

              echo "Checkout QA"
              git checkout QA
              git pull origin QA

              echo "Copiando solo los archivos modificados desde DEV"
              while read file; do
                  echo "Actualizando $file"
                  git checkout $COMMIT -- "$file"
                  git add "$file"
              done < files.txt

              echo "Creando commit de promoción"
              git commit -m "Promote files from DEV commit $COMMIT to QA"

              echo "Push a QA"
              git push origin QA

            displayName: "Promote changed files only"