trigger:
  branches:
    include:
      - DEV

pool:
  vmImage: ubuntu-latest

variables:
- group: IICS_SECRETS

stages:

# -----------------------
# STAGE DEV
# -----------------------
- stage: DEV
  displayName: "Build from DEV"

  jobs:
  - job: Build
    displayName: "Build using DEV commit"

    steps:
    - checkout: self
      persistCredentials: true
      clean: true

    - script: |
        echo "Pipeline disparado por commit:"
        echo $(Build.SourceVersion)

        echo "Autor:"
        git log -1 --pretty=format:'%an'

        echo "Guardando commit para promoción"
        echo $(Build.SourceVersion) > commit.txt
      displayName: "Capturar commit"

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: commit.txt
        artifact: commitinfo
        publishLocation: pipeline
      displayName: "Publicar commit a promover"


# -----------------------
# STAGE QA
# -----------------------
- stage: QA
  displayName: "Promote commit to QA"
  dependsOn: DEV
  condition: succeeded()

  jobs:
  - deployment: DeployQA
    displayName: "Promote DEV commit to QA"
    environment: QA

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            persistCredentials: true
            clean: true

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: commitinfo
              path: $(Pipeline.Workspace)
            displayName: "Descargar commit"

          - script: |

              COMMIT=$(cat $(Pipeline.Workspace)/commit.txt)

              echo "Commit a promocionar:"
              echo $COMMIT

              echo "Configurando git"
              git config --global user.email "dl-GlobalMasterIICSAdmin@ppg.com"
              git config --global user.name "IICSAdminCICD"

              echo "Fetch repo"
              git fetch origin

              echo "Checkout QA"
              git checkout -B QA origin/QA || git checkout -b QA

              echo "Moviendo QA al commit de DEV"
              git reset --hard $COMMIT

              echo "Push a QA"
              git push origin QA --force

            displayName: "Promote commit DEV -> QA"