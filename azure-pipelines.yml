trigger:
  branches:
    include:
      - DEV

pool:
  vmImage: ubuntu-latest

variables:
- group: IICS_SECRETS

stages:

# -----------------------
# STAGE DEV
# -----------------------
- stage: DEV
  displayName: "Build from DEV"

  jobs:
  - job: Build
    displayName: "Build using DEV commit"

    steps:

    - checkout: self
      persistCredentials: true
      clean: true

    # -----------------------
    # Instalar Python
    # -----------------------
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'
      displayName: "Use Python 3"

    # -----------------------
    # Login en IICS
    # -----------------------
    - script: |
        pip install requests
        python CICD/scripts/infa_login.py
      displayName: "Login to IICS"
      env:
        IICS_LOGIN_URL: $(IICS_LOGIN_URL)
        DEV_IICS_USERNAME: $(DEV_IICS_USERNAME)
        DEV_IICS_PASSWORD: $(DEV_IICS_PASSWORD)
        UAT_IICS_USERNAME: $(QA_IICS_USERNAME)
        UAT_IICS_PASSWORD: $(QA_IICS_PASSWORD)

    # -----------------------
    # Capturar commit
    # -----------------------
    - script: |
        echo "Pipeline disparado por commit:"
        echo $(Build.SourceVersion)

        echo "Autor:"
        git log -1 --pretty=format:'%an'

        echo "Guardando commit para promoción"
        echo $(Build.SourceVersion) > commit.txt
      displayName: "Capturar commit"

    # -----------------------
    # Publicar artifact
    # -----------------------
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: commit.txt
        artifact: commitinfo
        publishLocation: pipeline
      displayName: "Publicar commit a promover"


# -----------------------
# STAGE QA
# -----------------------
- stage: QA
  displayName: "Promote commit to QA"
  dependsOn: DEV
  condition: succeeded()

  jobs:
  - deployment: DeployQA
    displayName: "Promote DEV commit to QA"
    environment: QA

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            persistCredentials: true
            clean: true

          # -----------------------
          # Instalar Python
          # -----------------------
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
            displayName: "Use Python 3"

          # -----------------------
          # Descargar commit
          # -----------------------
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: commitinfo
              path: $(Pipeline.Workspace)
            displayName: "Descargar commit"

          # -----------------------
          # Promoción del commit
          # -----------------------
          - script: |

              COMMIT=$(cat $(Pipeline.Workspace)/commit.txt)

              echo "Commit que disparó el pipeline:"
              echo $COMMIT

              git config --global user.email "dl-GlobalMasterIICSAdmin@ppg.com"
              git config --global user.name "IICSAdminCICD"

              echo "Fetch completo del repo"
              git fetch --all --prune --unshallow || git fetch --all

              echo "Checkout QA"
              git checkout QA
              git pull origin QA

              echo "Archivos modificados en el commit:"
              CHANGED_FILES=$(git show --pretty="" --name-only $COMMIT)

              echo "$CHANGED_FILES"

              for file in $CHANGED_FILES
              do
                  echo "Promoviendo archivo $file"
                  git checkout $COMMIT -- "$file"
                  git add "$file"
              done

              echo "Creando commit de promoción"

              git diff --cached --quiet || git commit -m "Promote files from DEV commit $COMMIT to QA"

              echo "Push a QA"
              git push origin QA

            displayName: "Promote files changed in commit"