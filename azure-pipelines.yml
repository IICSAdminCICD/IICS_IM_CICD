trigger:
  branches:
    include:
      - DEV

pool:
  vmImage: ubuntu-latest

variables:
- group: IICS_SECRETS

stages:

# -----------------------
# VALIDATE
# -----------------------
- stage: VALIDATE
  displayName: "Validate commit message"

  jobs:
  - job: ValidateCommit

    steps:
    - checkout: self

    - script: |

        echo "Commit message:"
        echo "$(Build.SourceVersionMessage)"

        if [[ "$(Build.SourceVersionMessage)" != *"DEPLOY--"* ]]; then
          echo "Commit no contiene DEPLOY--. Cancelando pipeline."
          exit 1
        fi

        echo "Commit válido para deploy"

        echo $(Build.SourceVersion) > commit.txt

      displayName: "Validate DEPLOY trigger"

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: commit.txt
        artifact: commitinfo
        publishLocation: pipeline


# -----------------------
# STAGE QA
# -----------------------
- stage: QA
  displayName: "Promote commit to QA"
  dependsOn: VALIDATE
  condition: succeeded()

  jobs:
  - deployment: DeployQA
    displayName: "Promote DEV commit to QA"
    environment: QA

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            persistCredentials: true
            clean: true
            fetchDepth: 0

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: commitinfo
              path: $(Pipeline.Workspace)
            displayName: "Descargar commit"

          - script: |

              COMMIT=$(cat $(Pipeline.Workspace)/commit.txt)

              echo "Commit DEV a promover:"
              echo $COMMIT

              git config --global user.email "pipeline@devops"
              git config --global user.name "Azure DevOps Pipeline"

              echo "Fetch completo del repo"
              git fetch --all

              echo "Checkout QA"
              git checkout QA
              git pull origin QA

              echo "Detectando archivos modificados en el commit"

              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r --diff-filter=AM $COMMIT)

              echo "Archivos detectados:"
              echo "$CHANGED_FILES"

              COUNT=$(echo "$CHANGED_FILES" | wc -l)

              if [ "$COUNT" -eq 0 ]; then
                echo "No hay archivos válidos para desplegar"
                exit 1
              fi

              echo ""
              echo "Promoviendo archivos a QA..."

              for file in $CHANGED_FILES
              do
                  echo "Promoviendo $file"
                  git checkout $COMMIT -- "$file"
                  git add "$file"
              done

              git diff --cached --quiet || git commit -m "Promote files from DEV commit $COMMIT to QA"

              echo "Push a QA"
              git push origin QA

              echo ""
              echo "Construyendo paquete IICS"

              mkdir -p deploy_package/assets

              for file in $CHANGED_FILES
              do
                  mkdir -p deploy_package/assets/$(dirname $file)
                  git show $COMMIT:$file > deploy_package/assets/$file
              done

              echo "Creando package.xml"

              cat <<EOF > deploy_package/package.xml
              <package>
                  <name>AzurePipelineDeploy</name>
                  <description>Deployment generated by Azure DevOps pipeline</description>
              </package>
              EOF

              echo "Creando ZIP del paquete"

              cd deploy_package
              zip -r ../deploy_package.zip .
              cd ..

              echo "Contenido del ZIP:"
              unzip -l deploy_package.zip

              echo ""
              echo "Subiendo paquete a IICS"

              export ZIP_FILE=$(pwd)/deploy_package.zip

              python3 scripts/upload_iics_zip.py

            displayName: "Promote files + Build ZIP + Upload to IICS"

            env:
              IICS_SESSION_ID: $(IICS_SESSION_ID)
              IICS_POD_URL: $(IICS_POD_URL)