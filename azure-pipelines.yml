trigger:
  branches:
    include:
      - DEV

pool:
  vmImage: ubuntu-latest

variables:
- group: IICS_SECRETS

stages:

# -----------------------
# VALIDATE
# -----------------------
- stage: VALIDATE
  displayName: "Validate commit message"

  jobs:
  - job: ValidateCommit

    steps:
    - checkout: self

    - script: |

        echo "Commit message:"
        echo "$(Build.SourceVersionMessage)"

        if [[ "$(Build.SourceVersionMessage)" != *"DEPLOY--"* ]]; then
          echo "Commit no contiene DEPLOY--. Cancelando pipeline."
          exit 1
        fi

        echo "Commit válido para deploy"

        echo $(Build.SourceVersion) > commit.txt

      displayName: "Validate DEPLOY trigger"

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: commit.txt
        artifact: commitinfo
        publishLocation: pipeline


# -----------------------
# STAGE QA
# -----------------------
- stage: QA
  displayName: "Promote commit to QA"
  dependsOn: VALIDATE
  condition: succeeded()

  jobs:
  - deployment: DeployQA
    displayName: "Promote DEV commit to QA"
    environment: QA

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            persistCredentials: true
            clean: true
            fetchDepth: 0

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: commitinfo
              path: $(Pipeline.Workspace)

          - script: |

              COMMIT=$(cat $(Pipeline.Workspace)/commit.txt)

              echo "Commit DEV a promover:"
              echo $COMMIT

              git config --global user.email "pipeline@devops"
              git config --global user.name "Azure DevOps Pipeline"

              git fetch --all

              git checkout QA
              git pull origin QA

              echo "Detectando archivos modificados"

              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r --diff-filter=AM $COMMIT)

              echo "$CHANGED_FILES"

              COUNT=$(echo "$CHANGED_FILES" | wc -l)

              if [ "$COUNT" -eq 0 ]; then
                echo "No hay archivos válidos para deploy"
                exit 1
              fi

              echo "Promoviendo archivos"

              for file in $CHANGED_FILES
              do
                  git checkout $COMMIT -- "$file"
                  git add "$file"
              done

              git diff --cached --quiet || git commit -m "Promote files from DEV commit $COMMIT to QA"

              git push origin QA

              echo "Construyendo paquete IICS"

              mkdir -p deploy_package/assets

              for file in $CHANGED_FILES
              do
                  mkdir -p deploy_package/assets/$(dirname $file)
                  git show $COMMIT:$file > deploy_package/assets/$file
              done

              cat <<EOF > deploy_package/package.xml
              <package>
                  <name>AzurePipelineDeploy</name>
                  <description>Deployment generated by Azure DevOps pipeline</description>
              </package>
              EOF

              cd deploy_package
              zip -r ../deploy_package.zip .
              cd ..

              unzip -l deploy_package.zip

            displayName: "Promote files + Build ZIP"

          # ------------------------
          # LOGIN IICS
          # ------------------------

          - script: |
              python3 CICD/scripts/infa_login.py
            name: iicsLogin
            displayName: "Login to IICS"

            env:
              IICS_LOGIN_URL: $(IICS_LOGIN_URL)
              DEV_IICS_USERNAME: $(DEV_IICS_USERNAME)
              DEV_IICS_PASSWORD: $(DEV_IICS_PASSWORD)
              UAT_IICS_USERNAME: $(UAT_IICS_USERNAME)
              UAT_IICS_PASSWORD: $(UAT_IICS_PASSWORD)

          # ------------------------
          # UPLOAD ZIP
          # ------------------------

          - script: |

              echo "Uploading ZIP to IICS"

              export ZIP_FILE=$(pwd)/deploy_package.zip

              python3 CICD/scripts/upload_iics_zip.py

            displayName: "Upload ZIP to IICS"

            env:
              IICS_SESSION_ID: $(iicsLogin.sessionId)
              IICS_POD_URL: $(IICS_POD_URL)